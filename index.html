<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | GitHub Issue Tracker</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind CSS and Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="min-h-screen flex items-center bg-[#F8FAFC]">
    <main class="max-w-130 w-11/12 mx-auto p-8 bg-white rounded-lg shadow-md space-y-6 my-6">
        <div class="text-center">
            <div class="flex justify-center mb-6">
                <img src="assets/github-logo.png" alt="github-logo">
            </div>

            <h2 class="font-semibold text-2xl mb-1">GitHub Issues Tracker</h2>

            <p class="font-normal text-base text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <form class="space-y-4" action="">
            <div class="flex flex-col">
                <label class="font-medium text-base text-[#1F2937] mb-2" for="">Username</label>
                <input id="input-name" type="username" class="input w-full text-base mb-1.5 h-full p-4" placeholder="Enter Username">
                <p class="font-normal text-sm text-[#4A00FF]">Default: admin</p>
            </div>

            <div class="flex flex-col">
                <label class="font-medium text-base text-[#1F2937] mb-2" for="">Password</label>
                <input id="input-pass" type="password" class="input w-full text-base mb-1.5 h-full p-4" placeholder="Enter Password">
                <p class="font-normal text-sm text-[#4A00FF]">Default: admin123</p>
            </div>
        </form>

        <button onclick="validateLogin()" class="btn btn-primary w-full h-full p-4 font-semibold text-base leading-4 rounded-lg">Sign In</button>

        <div class="flex items-center gap-2">
            <hr class="flex-1 border-1 border-[#E4E4E7]">

            <p>OR</p>

            <hr class="flex-1 border-1 border-[#E4E4E7]">
        </div>

        <div class="text-center">
            <h3 class="text-sm text-[#64748B] mb-2">Demo Credentials:</h3>

            <div class="p-6 bg-[#F8FAFC] rounded-lg">
                <p class="text-[#1F2937]"><strong class="font-semibold">Username: </strong>admin</p>
                <p class="text-[#1F2937]"><strong class="font-semibold">Password: </strong>admin123</p>
            </div>
        </div>
    </main>

    <script src="scripts/login.js"></script>
</body>

</html>
